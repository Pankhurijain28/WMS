<app-navbar></app-navbar>

<div class="page-layout">

    <app-sidebar></app-sidebar>

    <div class="content-area">

        <div class="form-card">

            <div class="form-header">

                <h2>

                    {{
                    clientId
                    ? 'Edit Client'
                    : 'Create Client'
                    }}

                </h2>

                <p>
                    Client Information Management
                </p>

            </div>

            <form
                [formGroup]="clientForm">

                <div class="form-grid">

                    <div>

                        <label>
                            Client Name
                        </label>

                        <input
                            type="text"
                            formControlName="clientName">

                    </div>

                    <div>

                        <label>
                            Location
                        </label>

                        <input
                            type="text"
                            formControlName="clientLocation">

                    </div>

                    <div>

                        <label>
                            Phone Number
                        </label>

                        <input
                            type="text"
                            formControlName="clientPhoneNumber">

                    </div>

                    <div class="full-width">

                        <label>
                            Address
                        </label>

                        <textarea
                            rows="4"
                            formControlName="clientAddress">
                        </textarea>

                    </div>

                </div>

                <button
                    type="button"
                    class="save-btn"
                    (click)="save()">

                    Save Client

                </button>

            </form>

        </div>

    </div>

</div>
