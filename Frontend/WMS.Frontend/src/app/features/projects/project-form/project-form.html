<div class="page-wrapper">

  <div class="form-card">

    <div class="form-header">
      <h2>
        {{ projectId ? 'Edit Project' : 'Create Project' }}
      </h2>

      <p>
        Manage project information
      </p>
    </div>

    <form
      [formGroup]="projectForm"
      (ngSubmit)="save()">

      <div class="form-grid">

        <div class="form-group">

          <label>
            Project Name
          </label>

          <input
            type="text"
            formControlName="projectName"
            class="form-control"
            placeholder="Enter project name">

        </div>

        <div class="form-group">

          <label>
            Client ID
          </label>

          <input
            type="number"
            formControlName="clientId"
            class="form-control"
            placeholder="Enter client id">

        </div>

        <div class="form-group">

          <label>
            Start Date
          </label>

          <input
            type="date"
            formControlName="startDate"
            class="form-control">

        </div>

        <div class="form-group">

          <label>
            End Date
          </label>

          <input
            type="date"
            formControlName="endDate"
            class="form-control">

        </div>

      </div>

      <div class="form-actions">

        <button
          type="submit"
          class="btn-save">

          Save Project

        </button>

      </div>

    </form>

  </div>

</div>
