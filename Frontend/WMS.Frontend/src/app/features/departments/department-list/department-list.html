<div class="page-container">

  <div class="table-header">

    <div>
      <h1>Departments</h1>
      <p>Manage organizational departments</p>
    </div>

    <button
      class="add-btn"
      (click)="addDepartment()">

      + Add Department

    </button>

  </div>

  <div class="table-card">

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let item of departments">

          <td>{{item.departmentId}}</td>

          <td>{{item.departmentName}}</td>

          <td>{{item.description}}</td>

          <td>

            <button
              class="edit-btn"
              (click)="editDepartment(item.departmentId)">
              Edit
            </button>

            <button
              class="delete-btn"
              (click)="deleteDepartment(item.departmentId)">
              Delete
            </button>

          </td>

        </tr>

      </tbody>

    </table>

    <div class="table-footer">
      Total Departments: {{ departments.length }}
    </div>

  </div>

</div>
